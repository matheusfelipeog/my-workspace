[tools]
# A specification for CLIs. https://github.com/jdx/usage
usage = "latest"

python = "3.13"
uv = "latest"

node = "lts"
bun = "1.3"

codex = "latest"
claude-code = "latest"
opencode = "latest"

[settings]
idiomatic_version_file_enable_tools = ["python"]

[tasks."python:versions:_apply"]
hide = true
description = "Apply Python versions managed by mise"
usage = '''
arg "<command>" help="mise command to execute (install or upgrade)"
'''
run = """
PYTHON_VERSIONS="
3.7
3.8
3.9
3.10
3.11
3.12
3.13
3.14
"

for version in $PYTHON_VERSIONS; do
  #echo "Running: mise $usage_command python@$version"
  mise "$usage_command" "python@$version"
done
"""

[tasks."python:versions:install"]
description = "Install Python versions managed by mise"
run = "mise run python:versions:_apply install"

[tasks."python:versions:upgrade"]
description = "Upgrade installed Python versions managed by mise"
run = "mise run python:versions:_apply upgrade"


[tasks."python:uv-tools:_apply"]
hide = true
description = "Apply global Python tools managed by uv"
usage = '''
flag "--reinstall" help="Force reinstall uv tools"
'''
run = """
UV_REINSTALL_FLAG=""
if [ "${usage_reinstall:-false}" = "true" ]; then
  UV_REINSTALL_FLAG="--reinstall"
fi

echo "Using reinstall flag: '${UV_REINSTALL_FLAG}'"

UV_GLOBAL_TOOLS="
argcomplete
poetry
pipenv
virtualenv
twine
httpie
"

for tool in $UV_GLOBAL_TOOLS; do
  echo "Installing: $tool"
  uv tool install "$tool" $UV_REINSTALL_FLAG
done
"""

[tasks."python:uv-tools:install"]
description = "Install global Python tools managed by uv"
run = "mise run python:uv-tools:_apply"

[tasks."python:uv-tools:upgrade"]
description = "Upgrade all global Python tools managed by uv"
run = "uv tool upgrade --all"

[tasks."python:uv-tools:reinstall"]
description = "Reinstall global Python tools managed by uv"
run = "mise run python:uv-tools:_apply --reinstall"


[tasks."node:versions:_apply"]
hide = true
description = "Apply Node.js versions managed by mise"
usage = '''
arg "<command>" help="mise command to execute (install or upgrade)"
'''
run = """
NODE_VERSIONS="
20
21
22
23
24
25
26
"

for version in $NODE_VERSIONS; do
  mise "$usage_command" "node@$version"
done
"""

[tasks."node:versions:install"]
description = "Install Node.js versions managed by mise"
run = "mise run node:versions:_apply install"

[tasks."node:versions:upgrade"]
description = "Upgrade installed Node.js versions managed by mise"
run = "mise run node:versions:_apply upgrade"


[tasks."bootstrap:python"]
description = "Bootstrap Python runtimes and global uv tools"
run = """
mise run python:versions:install
mise run python:uv-tools:install
"""

[tasks."bootstrap:node"]
description = "Bootstrap Node.js runtimes"
run = "mise run node:versions:install"

[tasks."bootstrap"]
description = "Bootstrap global development environment"
run = """
mise install
mise run bootstrap:python
mise run bootstrap:node
"""
